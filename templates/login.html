{%extends 'layout/base.html'%}

{%block content%}
<div class="login-box mt-5">
    <h3 class="title-login text-center fw-bold mb-4">TRANG ĐĂNG NHẬP</h3>

    {% if err_msg %}
    <div class="alert alert-danger py-2 small">{{ err_msg }}</div>
    {% endif %}

    <form method="post">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" placeholder="Nhập tài khoản" name="username" required>
            <label for="username">Nhập tài khoản</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" name="password" required>
            <label for="password">Nhập mật khẩu</label>
        </div>

        <div class="d-grid">
            <button class="btn-login" type="submit">Đăng nhập</button>
        </div>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('index') }}" class="text-secondary small text-decoration-none">Quay lại trang chủ</a>
    </div>
</div>

{%endblock%}
