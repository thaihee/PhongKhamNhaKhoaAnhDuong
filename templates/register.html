{%extends 'layout/base.html'%}

{%block title%}Đăng ký{%endblock%}

{%block content%}

<h3 class="title-login text-center fw-bold mb-4 mt-5">TRANG ĐĂNG KÝ</h3>

{% if err_msg%}
<div class="alert alert-danger">{{err_msg}}</div>
{% endif %}

<form method="post" action="/register" enctype="multipart/form-data">
    <div class="form-floating mb-3 mt-3">
        <input type="text" class="form-control" id="fullname" placeholder="Nhập họ và tên" name="fullname">
        <label for="fullname">Nhập họ và tên</label>
    </div>

    <div class="form-floating mb-3 mt-3">
        <input type="text" class="form-control" id="username" placeholder="Nhập tài khoản" name="username" required>
        <label for="username">Nhập tài khoản</label>
    </div>
    <div class="mb-3">
        <label class="form-label">Ngày sinh</label>
        <input type="date" name="dob" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Giới tính</label>
        <select name="gender" class="form-select">
            <option value="NAM">Nam</option>
            <option value="NU">Nữ</option>
            <option value="KHAC">Khác</option>
        </select>
    </div>
    <div class="form-floating mt-3 mb-3">
        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" name="password"
               pattern=".{8,}" required>
        <label for="password">Nhập mật khẩu</label>
    </div>

    <div class="form-floating mt-3 mb-3">
        <input type="password" class="form-control" id="confirm" placeholder="Nhập lại mật khẩu" name="confirm" required>
        <label for="confirm">Nhập lại mật khẩu</label>
    </div>
    <div class="d-grid">
        <button class="btn-login" type="submit">Đăng ký</button>
    </div>
    <div class="text-center mt-3">
        <a href="{{ url_for('index') }}" class="text-secondary small text-decoration-none">Quay lại trang chủ</a>
    </div>
</form>

{%endblock%}
